# Start counting windows and panes from 1
set -g base-index 1
set -g pane-base-index 1

# Enable mouse support
set -g mouse on

# For vi/tmux d/y buffer sync
set -g focus-events on

set -g set-clipboard on
set -g detach-on-destroy off
set -g renumber-windows on
set -g history-limit 50000
set -g default-shell /usr/bin/fish

# Better window names
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Set default terminal and 256 colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",foot:Tc"

# vi keys for copy mode
setw -g mode-keys vi

# vi keys for command status
set -g status-keys vi

set -sg escape-time 10

set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 80
set -g window-status-separator ""
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=yellow] #S #[bg=default] "
set -g status-right "#[fg=brightblack]#(pomo) #[fg=yellow]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=yellow] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=yellow"
set -g message-style "bg=default,fg=yellow"
set -g message-command-style "bg=default,fg=yellow"
set -g mode-style "bg=yellow,fg=black"
setw -g clock-mode-colour yellow

# Use vi keys to navigate panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Use vi keys to resize panes
bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

# Add double-tap meta key to toggle last window
bind C-b last-window

# Better window navigation
bind C-p previous-window
bind C-n next-window

# Window management
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Kill windows and panes without confirm
bind x kill-pane
bind & kill-window

# Open new windows and panes in the current path
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Override enter in copy-mode to write selected text /tmp/buf for yyy/ppp
unbind -T copy-mode Enter
unbind -T copy-mode-vi Enter
bind -T copy-mode Enter send-keys -X copy-selection-and-cancel \; save-buffer /tmp/buf
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel \; save-buffer /tmp/buf

# Trun pane sync on/off 
bind -r y setw synchronize-panes

# Reload configuration
bind -r r source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# Plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'btm'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
