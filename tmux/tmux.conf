# Second prefix
unbind C-a
set -g prefix2 C-a

bind x kill-pane
bind & kill-window

# Sync
bind -r y setw synchronize-panes

# Copy mode
unbind -T copy-mode Enter
unbind -T copy-mode-vi Enter
bind -T copy-mode Enter send-keys -X copy-selection-and-cancel \; save-buffer /tmp/buf
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel \; save-buffer /tmp/buf

# Splits
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

unbind |
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind 'C-\' split-window -h -c "#{pane_current_path}"
unbind -
bind - split-window -v -c "#{pane_current_path}"
unbind _
bind _ split-window -v -c "#{pane_current_path}"

# Reload
bind -r r source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# Sessions
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind S new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

# Status bar
set -g status-position top
set -g status-interval 1
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=yellow] #S #[bg=default] "
set -g status-right "#[fg=yellow]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=yellow] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=yellow"
set -g message-style "bg=default,fg=yellow"
set -g message-command-style "bg=default,fg=yellow"
set -g mode-style "bg=yellow,fg=black"
setw -g clock-mode-colour yellow

# Indexing
set -g base-index 1
set -g pane-base-index 1

# Behavior
set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g detach-on-destroy off
set -g renumber-windows on
set -g history-limit 50000
set -g default-shell /usr/bin/fish
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Escape time
set -sg escape-time 10

# Terminal
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",foot:Tc"

# Vi keys
setw -g mode-keys vi
set -g status-keys vi

# Navigation
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

bind C-b last-window
bind C-a last-window
bind C-p previous-window
bind C-n next-window

bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

bind c new-window -c "#{pane_current_path}"
