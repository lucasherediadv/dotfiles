# Disable status bar
# set -g status off

bind-key x kill-pane
bind-key & kill-window

# Turn pane sync on/off
bind -r y setw synchronize-panes

# override Enter in copy-mode to write selected text /tmp/buf for yyy/ppp
unbind -T copy-mode Enter
unbind -T copy-mode-vi Enter
bind -T copy-mode Enter send-keys -X copy-selection-and-cancel \; save-buffer /tmp/buf
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel \; save-buffer /tmp/buf

# Standard splits (keep default keys but stay in current dir)
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

unbind |
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind 'C-\' split-window -h -c "#{pane_current_path}"
unbind -
bind - split-window -v -c "#{pane_current_path}"
unbind _
bind _ split-window -v -c "#{pane_current_path}"

###

# Reload configuration
bind -r r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

set -g status-style "fg=#665c54"
set -g status-bg default
set -g status-position top
set -g status-left ""
# set -g status-right "#(pomo)"
set -g status-right ""
set -g status-interval 1

# Start with 1
set -g base-index 1
set -g pane-base-index 1

# Enable mouse support
set -g mouse on

# For vim/tmux d/y buffer sync
set -g focus-events

# Use vi keys for copy mode
setw -g mode-keys vi

# Use vi keys for command status
set -g status-keys vi

# Address vi mode switching delay
set -s escape-time 0

# Add double-tap meta key to toggle last window
bind-key C-b last-window

# Use vi keys to navigate panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Use vi keys to resize
bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

# Renumber windows in numerical order
set -g renumber-windows on

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",foot:Tc"

# Rename panes to current working directory
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

set -g default-shell /usr/bin/fish

# Easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window

# Swapping windows
bind-key -r "<" swap-window -d -t -1
bind-key -r ">" swap-window -d -t +1

bind-key "c" new-window -c "#{pane_current_path}"
