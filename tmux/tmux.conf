# Enable mouse support
set -g mouse on

# Set fish as default tmux shell
set-option -g default-shell "/usr/bin/fish"

# Minimal status bar
set -g status-style "fg=#665c54,bg=default"
set -g status-position top
set -g status-interval 1
set -g status-right ""
set -g status-left ""

# Start with 1
set -g base-index 1
set -g pane-base-index 1

# For vim/tmux d/y buffer sync
set -g focus-events

# Use vim keys for copy mode
setw -g mode-keys vi

# Use vim keys for command status
set -g status-keys vi

# Address vim mode switching delay
set -s escape-time 0

# Use vim keys to navigate panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

set -g renumber-windows on

# Add double-tap meta key to toggle last window
bind-key C-b last-window

# Use vim keys to resize panes
bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

# True color support
set -g default-terminal "$TERM"
set -g terminal-overrides ",$TERM:Tc"
