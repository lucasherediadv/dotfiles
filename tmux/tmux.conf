# Disable status bar
set -g status off

# Enable mouse support
set -g mouse on

# For vim/tmux d/y buffer sync
set -g focus-events

# Use vi keys for copy mode
setw -g mode-keys vi

# Use vi keys for command status
set -g status-keys vi

# Address vi mode switching delay
set -s escape-time 0

# Add double-tap meta key to toggle last window
bind-key C-b last-window

# Use vi keys to navigate panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Use vi keys to resize
bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

# Renumber windows in numerical order
set -g renumber-windows on

# Better window names
set -g automatic-rename

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",foot:Tc"
